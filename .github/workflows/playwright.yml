# GitHub Actions CI/CD Pipeline
name: Playwright End-to-End Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: backend

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E Test Dependencies
        run: npm ci
        working-directory: e2e-tests

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: e2e-tests

      # GENERATE THE DATA FILE DYNAMICALLY
      - name: Create Test Credentials JSON File
        run: |
          mkdir -p tests/data
          echo '${{ secrets.TEST_CREDENTIALS_JSON }}' > tests/data/credentials.env.json
        working-directory: e2e-tests

      - name: Run Playwright Tests
        env:
          PORT: ${{secrets.PORT}}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_SECRET_KEY: ${{ secrets.RAZORPAY_SECRET_KEY }}
          SELLER_EMAIL: ${{ secrets.SELLER_EMAIL }}
          SELLER_PASSWORD: ${{ secrets.SELLER_PASSWORD }}
          VITE_CURRENCY: ${{ secrets.VITE_CURRENCY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_BACKEND_URL: ${{secrets.VITE_BACKEND_URL}}
        run: npx playwright test
        working-directory: e2e-tests
